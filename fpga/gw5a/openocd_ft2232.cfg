# GW5A JTAG (FT2232 - Dual RS232) OpenOCD config.
# Generate the YAML with the VexRiscv debug option before using this file.

set BRIEY_CPU0_YAML [file normalize [file join [pwd] hw/spinal/cpu0.yaml]]

adapter driver ftdi
ftdi vid_pid 0x0403 0x6010
ftdi device_desc "Dual RS232"
ftdi channel 0
ftdi layout_init 0x08 0x0b

# If several adapters are connected, select one locally without committing it.
# ftdi device_desc "USB Debugger"

source [find target/briey.cfg]
